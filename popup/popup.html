<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书神回复 - 设置</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>⚡ 小红书神回复</h1>
      <p class="subtitle">AI 驱动的评论回复生成器</p>
    </div>

    <form id="settingsForm">
      <div class="section">
        <h2>🔑 API 配置</h2>
        <div class="field">
          <label for="apiBase">API Base URL</label>
          <input type="url" id="apiBase" placeholder="https://api.openai.com/v1" />
        </div>
        <div class="field">
          <label for="apiKey">API Key</label>
          <div class="key-input-wrapper">
            <input type="password" id="apiKey" placeholder="sk-..." />
            <button type="button" id="toggleKey" class="toggle-btn" title="显示/隐藏">👁</button>
          </div>
        </div>
        <div class="field">
          <label for="model">模型名称</label>
          <input type="text" id="model" placeholder="gpt-4o-mini" />
        </div>
      </div>

      <div class="section">
        <h2>🎨 回复风格</h2>
        <div class="style-grid">
          <label class="style-option">
            <input type="radio" name="style" value="幽默搞笑" />
            <span class="style-card">😂 幽默搞笑</span>
          </label>
          <label class="style-option">
            <input type="radio" name="style" value="毒舌犀利" />
            <span class="style-card">🗡️ 毒舌犀利</span>
          </label>
          <label class="style-option">
            <input type="radio" name="style" value="暖心共情" />
            <span class="style-card">💗 暖心共情</span>
          </label>
          <label class="style-option">
            <input type="radio" name="style" value="知识科普" />
            <span class="style-card">📚 知识科普</span>
          </label>
          <label class="style-option">
            <input type="radio" name="style" value="custom" />
            <span class="style-card">✏️ 自定义</span>
          </label>
        </div>
        <div class="field" id="customStyleField" style="display:none;">
          <label for="customStyle">自定义风格描述</label>
          <textarea id="customStyle" rows="2" placeholder="例如：用东北话回复，带点调侃但不失真诚"></textarea>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn-save">💾 保存设置</button>
      </div>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script src="popup.js"></script>
</body>

</html>
