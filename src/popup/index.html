<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书神回复</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>⚡ 小红书神回复</h1>
      <p class="subtitle">AI 驱动的评论回复生成器</p>
    </div>

    <div class="status-card" id="statusCard">
      <div class="status-icon" id="statusIcon">⏳</div>
      <div class="status-text" id="statusText">检查配置中...</div>
    </div>

    <div class="menu">
      <button class="menu-item" id="btnSettings">
        <span class="menu-icon">⚙️</span>
        <span class="menu-label">插件设置</span>
        <span class="menu-arrow">›</span>
      </button>
      <button class="menu-item" id="btnDebug">
        <span class="menu-icon">🐛</span>
        <span class="menu-label">调试信息</span>
        <span class="menu-arrow">›</span>
      </button>
    </div>

    <div class="footer">
      <span>v1.0.0</span>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>

</html>
